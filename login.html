<!DOCTYPE html>
<html>
<head>
  <title>Login com Google</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxIWlC3xurzvX1PGgXj1BJFcmEjip_w3o",
      authDomain: "painel-controladoria.firebaseapp.com",
      projectId: "painel-controladoria",
      storageBucket: "painel-controladoria.firebasestorage.app",
      messagingSenderId: "126947450890",
      appId: "1:126947450890:web:c6ed7444ee2c62be23fff3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function () {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(async (result) => {
          const user = result.user;
          const idToken = await user.getIdToken();
          window.location.href = `https://dashcontroladoria-afs8dky2nquzbebuomdwfi.streamlit.app/?token=${idToken}`;
        })
        .catch((error) => {
          alert("Erro no login: " + error.message);
        });
    };
  </script>
</head>
<body>
  <h2>Entrar com sua conta Google</h2>
  <button onclick="login()">Entrar com Google</button>
</body>
</html>
